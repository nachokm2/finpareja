name: flutter_app
description: Aplicación de gestión financiera personal y compartida para pareja.
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.3.0
  form_field_validator: ^1.1.0
  json_annotation: ^4.8.0
  material_symbols_icons: ^4.2874.0
  go_router: ^14.0.0
  fpdart: ^1.1.0
  intl: ^0.20.2
  fl_chart: ^0.68.0
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  json_serializable: ^6.7.0
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

# Ícono de la app (logo: corazón + línea de crecimiento). Genera los mipmaps de
# Android y el ícono adaptativo. Regenerar: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#2563EB"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  # Empaqueta la fuente MaterialIcons (Icons.*). Sin esto los íconos
  # del navbar y toda la app salen como cajas/(X) en el build release.
  uses-material-design: true
